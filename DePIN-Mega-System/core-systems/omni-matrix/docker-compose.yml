version: '3.8'

services:
  omni-matrix:
    build: .
    container_name: omni-matrix
    restart: unless-stopped
    
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    
    env_file:
      - .env
    
    ports:
      - "8080:8080"    # HTTP API
      - "9090:9090"    # Prometheus metrics
      - "5001:5001"    # IPFS API
      - "4001:4001"    # IPFS Swarm
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./config:/app/config
    
    networks:
      - omni-matrix-network
    
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: omni-matrix-prometheus
    restart: unless-stopped
    
    ports:
      - "9091:9090"
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    
    networks:
      - omni-matrix-network
    
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: omni-matrix-grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    
    networks:
      - omni-matrix-network
    
    profiles:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  omni-matrix-network:
    driver: bridge
